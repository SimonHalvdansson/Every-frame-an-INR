<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Every Frame an INR</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="shell">
    <section class="lab-grid" aria-label="Interactive INR workspace">
      <div class="preview-column">
        <header class="topbar">
          <h1>Every Frame an INR</h1>
          <code id="device-value">--</code>
        </header>

        <div class="preview-grid">
          <figure class="image-panel reference-panel">
            <figcaption>
              <span>Reference</span>
              <code id="reference-meta">128 x 128</code>
            </figcaption>
            <div class="image-frame">
              <canvas id="reference-canvas" width="128" height="128" aria-label="Reference target image"></canvas>
            </div>
          </figure>

          <figure class="image-panel output-panel">
            <figcaption>
              <span>INR output</span>
              <code id="output-meta">epoch 0</code>
            </figcaption>
            <div class="image-frame">
              <canvas id="latest-canvas" width="128" height="128" aria-label="Latest INR output"></canvas>
            </div>
          </figure>
        </div>

        <div class="control-strip">
          <button id="run-button" class="primary-button expressive-button" type="button">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path id="run-button-icon" d="M8 5v14l11-7z"/>
            </svg>
            <span>Start</span>
          </button>
          <button id="step-button" class="expressive-button" type="button">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 5v14l9-7-9-7zm11 0h2v14h-2z"/>
            </svg>
            <span>Step</span>
          </button>
          <button id="reset-button" class="expressive-button" type="button">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5a7 7 0 1 1-6.3 4H3l4-4 4 4H8.2A4.8 4.8 0 1 0 12 7.2V5z"/>
            </svg>
            <span>Reset</span>
          </button>
        </div>

        <section class="weights-panel" aria-label="Network weights">
          <button id="weights-toggle" class="weights-toggle" type="button" aria-expanded="false" aria-controls="weights-contents">
            <span>Weights</span>
            <code id="weights-summary">--</code>
            <svg class="caret-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="m7 10 5 5 5-5"/>
            </svg>
          </button>
          <div class="weights-contents" id="weights-contents" aria-hidden="true">
            <div class="weights-strip" id="weights-strip"></div>
          </div>
        </section>
      </div>

      <aside class="side-panel" aria-label="Controls and metrics">
        <section class="media-picker-field" aria-label="Target media">
          <span>Target</span>
          <button id="webcam-button" class="webcam-button" type="button">Use webcam</button>
          <div class="media-picker" id="media-picker"></div>
        </section>

        <section class="model-field" aria-label="Model">
          <button id="model-toggle" class="model-toggle" type="button" aria-expanded="false" aria-controls="model-advanced">
            <span>Model</span>
            <code id="model-summary">--</code>
            <svg class="caret-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="m7 10 5 5 5-5"/>
            </svg>
          </button>
          <div class="model-picker" id="model-picker" role="radiogroup" aria-label="Model presets"></div>
          <div class="model-advanced" id="model-advanced" aria-hidden="true">
            <label class="setting-row" for="hidden-dim-select">
              <span>Hidden dim</span>
              <select id="hidden-dim-select">
                <option value="64">64</option>
                <option value="128">128</option>
                <option value="256">256</option>
                <option value="384">384</option>
                <option value="512">512</option>
                <option value="768">768</option>
              </select>
            </label>
            <label class="setting-row" for="hidden-layers-select">
              <span>Hidden layers</span>
              <select id="hidden-layers-select">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
              </select>
            </label>
            <label class="setting-row" for="feature-dim-select">
              <span>Features</span>
              <select id="feature-dim-select">
                <option value="64">64</option>
                <option value="128">128</option>
                <option value="192">192</option>
                <option value="256">256</option>
                <option value="384">384</option>
              </select>
            </label>
            <label class="setting-row" for="feature-type-select">
              <span>Feature type</span>
              <select id="feature-type-select">
                <option value="fourier">Fourier</option>
                <option value="gabor">Gabor</option>
              </select>
            </label>
            <label class="lr-row gabor-width-row" for="gabor-atom-width-slider">
              <span>Atom width</span>
              <input id="gabor-atom-width-slider" type="range" min="0.01" max="0.5" step="0.005">
              <code id="gabor-atom-width-value">--</code>
            </label>
            <label class="setting-row" for="activation-select">
              <span>Activation</span>
              <select id="activation-select">
                <option value="silu">SiLU</option>
                <option value="tanh">tanh</option>
                <option value="relu">ReLU</option>
              </select>
            </label>
            <label class="setting-row toggle-row" for="rmsnorm-toggle">
              <span>RMSNorm</span>
              <input id="rmsnorm-toggle" type="checkbox">
            </label>
            <label class="lr-row" for="image-start-lr-slider">
              <span>Image start LR</span>
              <input id="image-start-lr-slider" type="range" min="-4.3" max="-1.3" step="0.01">
              <code id="image-start-lr-value">--</code>
            </label>
            <label class="lr-row" for="image-end-lr-slider">
              <span>Image end LR</span>
              <input id="image-end-lr-slider" type="range" min="-4.3" max="-1.3" step="0.01">
              <code id="image-end-lr-value">--</code>
            </label>
            <label class="lr-row" for="video-lr-slider">
              <span>Video LR</span>
              <input id="video-lr-slider" type="range" min="-4.3" max="-1.3" step="0.01">
              <code id="video-lr-value">--</code>
            </label>
          </div>
        </section>

        <section class="resolution-field" aria-label="Target resolution">
          <span>Resolution</span>
          <div class="resolution-picker" id="resolution-picker" role="radiogroup" aria-label="Target resolution"></div>
        </section>

        <label class="slider-row" for="epoch-slider">
          <span>Epochs per preview</span>
          <span class="slider-control">
            <input id="epoch-slider" type="range" min="1" max="10" value="1">
            <code><span id="slider-value">1</span></code>
          </span>
        </label>

        <section class="metrics" aria-label="Training metrics">
          <article class="metric-tile">
            <span>Epoch</span>
            <strong id="epoch-value">0</strong>
          </article>
          <article class="metric-tile">
            <span>MSE loss</span>
            <strong id="loss-value">--</strong>
          </article>
          <article class="metric-tile">
            <span>PSNR</span>
            <strong id="psnr-value">--</strong>
          </article>
          <article class="metric-tile">
            <span>Learning rate</span>
            <strong id="learning-rate-value">--</strong>
          </article>
          <article class="metric-tile stream-metric">
            <span>Avg loss</span>
            <strong id="avg-loss-value">--</strong>
          </article>
          <article class="metric-tile stream-metric">
            <span>Avg PSNR</span>
            <strong id="avg-psnr-value">--</strong>
          </article>
        </section>

        <section class="chart-panel" aria-label="Loss chart">
          <div class="chart-heading">
            <span>Loss curve</span>
            <code id="timing-value">--</code>
          </div>
          <div class="chart-canvas-wrap">
            <canvas id="loss-chart" width="720" height="196"></canvas>
            <div class="chart-empty" id="chart-empty" aria-hidden="true">
              <svg viewBox="0 0 96 72" role="img">
                <path d="M14 18c16 2 19 12 31 17 13 5 20 3 35 19" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                <circle cx="14" cy="18" r="5" fill="currentColor"/>
                <circle cx="45" cy="35" r="5" fill="currentColor"/>
                <circle cx="80" cy="54" r="5" fill="currentColor"/>
              </svg>
            </div>
          </div>
          <p id="error-message" class="error-message" hidden></p>
        </section>
      </aside>
    </section>
  </main>

  <script src="./vendor/tfjs/tf.min.js"></script>
  <script src="./vendor/tfjs/tf-backend-webgpu.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
